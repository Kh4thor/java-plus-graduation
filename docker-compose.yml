networks:
  ewm-net:
    name: ewm-net

services:
  discovery-server:
    build: infra/discovery-server
    container_name: infra-discovery
    ports:
      - "8761:8761"
    networks:
      - ewm-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      timeout: 5s
      interval: 10s
      retries: 12

  config-server:
    build: infra/config-server
    container_name: infra-config
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - SPRING_PROFILES_ACTIVE=native
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      timeout: 5s
      interval: 15s
      retries: 10

  gateway-server:
    build: infra/gateway-server
    container_name: infra-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 5s
      interval: 15s
      retries: 10

  event-db:
    image: postgres:16.1
    container_name: db-event
    networks:
      - ewm-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=event_password
      - POSTGRES_USER=event_user
      - POSTGRES_DB=event-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d event-db -U event_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  request-db:
    image: postgres:16.1
    container_name: db-request
    networks:
      - ewm-net
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=request_password
      - POSTGRES_USER=request_user
      - POSTGRES_DB=request-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d request-db -U request_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  user-db:
    image: postgres:16.1
    container_name: db-user
    networks:
      - ewm-net
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=user_password
      - POSTGRES_USER=user_user
      - POSTGRES_DB=user-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d user-db -U user_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  compilation-db:
    image: postgres:16.1
    container_name: compilation-db
    networks:
      - ewm-net
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_PASSWORD=compilation_password
      - POSTGRES_USER=compilation_user
      - POSTGRES_DB=compilation-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d compilation-db -U compilation_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  category-db:
    image: postgres:16.1
    container_name: db-category
    networks:
      - ewm-net
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_PASSWORD=category_password
      - POSTGRES_USER=category_user
      - POSTGRES_DB=category-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d category-db -U category_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  comment-db:
    image: postgres:16.1
    container_name: db-comment
    networks:
      - ewm-net
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_PASSWORD=comment_password
      - POSTGRES_USER=comment_user
      - POSTGRES_DB=comment-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d comment-db -U comment_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  analyzer-db:
    image: postgres:16.1
    container_name: db-analyzer
    networks:
      - ewm-net
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_PASSWORD=analyzer_password
      - POSTGRES_USER=analyzer_user
      - POSTGRES_DB=analyzer-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d analyzer-db -U analyzer_user"]
      timeout: 5s
      interval: 10s
      retries: 15

  event-service:
    build: core/event-service
    container_name: core-event
    depends_on:
      event-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  request-service:
    build: core/request-service
    container_name: core-request
    depends_on:
      request-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - GATEWAY_URL=http://infra-gateway:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  user-service:
    build: core/user-service
    container_name: core-user
    depends_on:
      user-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  compilation-service:
    build: core/compilation-service
    container_name: core-compilation
    depends_on:
      compilation-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  category-service:
    build: core/category-service
    container_name: core-category
    depends_on:
      category-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  comment-service:
    build: core/comment-service
    container_name: core-comment
    depends_on:
      comment-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  kafka:
    image: confluentinc/confluent-local:7.4.3
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - ewm-net
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      CLUSTER_ID: K0EA9p0yEe6MkAAAAkKsEg

  kafka-init-topics:
    image: confluentinc/confluent-local:7.4.3
    container_name: kafka-init-topics
    depends_on:
      - kafka
    networks:
      - ewm-net
    command: bash -c "sleep 10 && kafka-topics --create --topic stats.user-actions.v1 --partitions 1 --replication-factor 1 --if-not-exists --bootstrap-server kafka:29092 && kafka-topics --create --topic stats.events-similarity.v1 --partitions 1 --replication-factor 1 --if-not-exists --bootstrap-server kafka:29092"
    init: true

  collector:
    build: stats/collector
    container_name: stats-collector
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  aggregator:
    build: stats/aggregator
    container_name: stats-aggregator
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  analyzer:
    build: stats/analyzer
    container_name: stats-analyzer
    depends_on:
      analyzer-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ewm-net
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s