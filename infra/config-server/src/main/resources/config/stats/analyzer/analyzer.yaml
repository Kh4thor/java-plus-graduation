server:
  port: 8089
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: analyzer
    leaseRenewalIntervalInSeconds: 10
    metadata-map:
      "gRPC_port": ${grpc.server.port}
spring:
  datasource:
    url: jdbc:postgresql://analyzer-db:5432/analyzer-db
    username: analyzer_user
    password: analyzer_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analyzer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
grpc:
  server:
    port: 19337
kafka-analyzer:
  topics:
    user-actions-topic: stats.user-actions.v1
    events-similarity-topic: stats.events-similarity.v1