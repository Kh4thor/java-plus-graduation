server:
  port: 8082
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: request-service
    leaseRenewalIntervalInSeconds: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
spring:
  datasource:
    url: jdbc:postgresql://request-db:5432/request-db
    username: request_user
    password: request_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  client:
    analyzerGrpcClient:
      address: 'discovery:///analyzer'
      negotiationType: PLAINTEXT
      metadata:
        portKey: gRPC__port
    userActionControllerGrpcClient:
      address: 'discovery:///collector'
      negotiationType: PLAINTEXT
      metadata:
        portKey: gRPC__port

gateway:
  url: http://gateway-server:8080