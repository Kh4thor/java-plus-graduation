server:
  port: 8084
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: compilation-service
    leaseRenewalIntervalInSeconds: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
spring:
  datasource:
    url: jdbc:postgresql://compilation-db:5432/compilation-db
    username: compilation_user
    password: compilation_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  client:
    analyzerGrpcClient:
      address: 'discovery:///analyzer'
      negotiationType: PLAINTEXT
      metadata:
        portKey: gRPC.port

gateway:
  url: http://infra-gateway:8080