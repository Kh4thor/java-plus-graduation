syntax = "proto3";

package stats.service.collector;

import "google/protobuf/empty.proto";
import "message/recommendations_messages.proto";

option java_package = "malyshev.egor.stats.proto";
option java_multiple_files = true;

service UserActionController {
  rpc CollectUserAction(ru.practicum.ewm.stats.proto.UserActionProto) returns (google.protobuf.Empty);
}